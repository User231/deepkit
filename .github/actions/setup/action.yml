name: 'Setup job'
description: ''

runs:
  using: 'composite'
  steps:
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 20.10.0
        # Disabled cache - self-hosted runners share cache which causes conflicts during parallel execution
        # cache: yarn

    - name: Run yarn install
      shell: bash
      run: yarn --frozen-lockfile
      env:
        CI: 'true'
        # Use unique cache per runner to avoid cache conflicts during parallel execution
        YARN_CACHE_FOLDER: ${{ runner.temp }}/.yarn-cache
