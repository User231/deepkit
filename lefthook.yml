# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

# Parallel execution for performance
parallel: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  commands:
    # Format staged files
    prettier:
      glob: '[*.{json,yml,yaml,html,ts,tsx,js,jsx},!./package-lock.json]'
      run: ./node_modules/.bin/prettier --write {staged_files} && git add {staged_files}

    # NOTE: full-monorepo typecheck is enforced on pre-push (below), not pre-commit
    # (incremental `tsc --build` is too slow to run on every single commit).

    # Lint check (required - blocks commit on failure)
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: ./node_modules/.bin/prettier --check {staged_files}
      fail_text: |
        ❌ Lint check failed!
        Run: ./node_modules/.bin/prettier --write <files>

    # Block forbidden imports in type-compiler (circular dependency prevention)
    no-core-in-type-compiler:
      glob: 'packages/type-compiler/src/*.ts'
      run: |
        if grep -E "^import.*from ['\"]@deepkit/core" {staged_files} 2>/dev/null; then
          echo ""
          echo "❌ Found @deepkit/core import in type-compiler!"
          echo "   type-compiler cannot depend on core (circular dependency)."
          echo "   Use TypeCompilerError from ./error.js instead of DeepkitError."
          exit 1
        fi
      fail_text: |
        ❌ Forbidden import detected!
        type-compiler cannot import from @deepkit/core.

    # Block TODO/FIXME in newly added code (not existing code)
    no-todo:
      glob: '*.{ts,tsx,js,jsx}'
      run: |
        if git diff --cached --diff-filter=ACMR -U0 -- {staged_files} | grep -E '^\+.*(TODO|FIXME)' | grep -v '^+++'; then
          echo ""
          echo "❌ Found TODO/FIXME in added lines. Remove before committing."
          exit 1
        fi
      fail_text: |
        ❌ TODO/FIXME check failed!
        Remove TODO/FIXME comments from your changes before committing.

# Pre-push hooks for more thorough checks
pre-push:
  commands:
    # Block pushes that don't type-check. Incremental `tsc --build` (now fixed —
    # was `--noEmit`, which is incompatible with composite project references and
    # always failed with TS6310). Warm runs are a few seconds.
    typecheck:
      run: npm run typecheck
      fail_text: |
        ❌ TypeScript typecheck failed — fix type errors before pushing.
        Run: npm run typecheck

    # Run tests for affected packages before pushing
    # This is advisory - push proceeds but warns on failure
    test-warning:
      run: |
        echo "⚠️  Remember to run tests for affected packages before pushing:"
        echo "   npm run test packages/<affected-package>/"
      skip: true  # Advisory only, enable when ready

# Post-checkout hooks for maintaining build state
post-checkout:
  commands:
    rebuild-compiler:
      run: |
        # Rebuild type-compiler if its source changed
        if git diff --name-only HEAD@{1} HEAD | grep -q "packages/type-compiler/"; then
          echo "🔨 Rebuilding type-compiler..."
          npm run postinstall
        fi
      skip: true  # Enable when ready
